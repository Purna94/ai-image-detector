<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Image Detector</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-gradient-to-br from-gray-900 via-slate-800 to-gray-900 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-2xl bg-white/10 backdrop-blur-lg rounded-3xl shadow-2xl border border-white/20 p-8 space-y-8">
    <div class="text-center">
      <h1 class="text-4xl font-extrabold text-white tracking-tight">AI Image Detector</h1>
      <p class="text-gray-400 mt-2 text-sm">Upload an image to check if it's AI-generated or Real</p>
    </div>

    <div id="dropZone" class="relative border-2 border-dashed border-gray-500/50 rounded-2xl p-12 text-center cursor-pointer transition-all duration-300 hover:border-indigo-400/70 hover:bg-white/5">
      <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.webp" class="hidden" />
      <div id="uploadPrompt" class="space-y-3">
        <div class="flex justify-center">
          <svg class="w-16 h-16 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
        </div>
        <p class="text-gray-300 text-lg font-medium">Drag & drop your image here</p>
        <p class="text-gray-500 text-sm">or click to browse — PNG, JPG, WEBP</p>
      </div>
      <div id="previewArea" class="hidden">
        <img id="previewImg" class="mx-auto max-h-64 rounded-xl shadow-lg object-contain" alt="Preview" />
        <button id="changeBtn" class="mt-4 text-sm text-indigo-400 hover:text-indigo-300 underline transition">Choose another image</button>
      </div>
    </div>

    <div id="spinner" class="hidden flex justify-center py-4">
      <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div id="results" class="hidden space-y-4">
      <div id="resultCard" class="rounded-2xl p-6 text-center transition-all duration-500 bg-white/5 border border-white/10">
        <p id="resultLabel" class="text-3xl font-bold"></p>
        <p id="resultConfidence" class="text-lg text-gray-400 mt-1"></p>
      </div>
      <div id="breakdown" class="grid grid-cols-2 gap-4">
        <div class="rounded-xl p-4 bg-white/5 border border-white/10 text-center">
          <p id="realLabel" class="text-sm text-gray-400">Real</p>
          <p id="realScore" class="text-xl font-semibold text-green-400">0%</p>
        </div>
        <div class="rounded-xl p-4 bg-white/5 border border-white/10 text-center">
          <p id="fakeLabel" class="text-sm text-gray-400">AI-Generated</p>
          <p id="fakeScore" class="text-xl font-semibold text-red-400">0%</p>
        </div>
      </div>
    </div>

    <div class="text-center text-gray-600 text-xs">
      Powered by <span class="text-indigo-400">umm-maybe/AI-image-detector</span> &middot; FastAPI &middot; PyTorch
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
